services:
  - type: web
    name: maya-calendar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: maya-calendar-db
          property: connectionString
      - key: MAYA_CLIENT_ID
        sync: false
      - key: MAYA_CLIENT_SECRET
        sync: false
      - key: MAYA_API_URL
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER
        value: "true"

databases:
  - name: maya-calendar-db
    plan: free
    databaseName: maya_calendar
